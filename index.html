<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POKER QUEST ― ポーカーの役とオッズを学ぶ ―</title>
<!-- Google tag (gtag.js) -->

  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}

</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;text-size-adjust:100%}
html,body{max-width:100vw;overflow-x:hidden}
:root{
  --bg1:#0d4b32;--bg2:#116b46;--bg3:#052015;
  --paper:#f6f1e2;--paper2:#fffdf6;--ink:#241d12;--muted:#8a7a5c;--line:#ddd0ad;
  --gold:#d9a441;--gold-dark:#a6742a;
  --felt:#0f6b3f;--felt-dark:#083c23;
  --ok:#2f9e5c;--ok-bg:#e6f5ec;--ok-bd:#8fd1ab;
  --ng:#c8433f;--ng-bg:#fbe9e8;--ng-bd:#e79a97;
  --cred:#c1443a;--cblack:#20241f;
  --shadow:0 16px 40px rgba(0,0,0,.35);
  --r:10px;--f:system-ui,-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;
}
body{font-family:var(--f);color:var(--ink);font-weight:600;min-height:100vh;
  background:radial-gradient(circle at 20% 0%,var(--bg2) 0,var(--bg1) 40%,var(--bg3) 100%);}
.app-shell{min-height:100vh;display:flex;flex-direction:column;gap:12px;padding:10px 12px 24px;}

/* Header */
.game-header{display:flex;align-items:center;gap:18px;flex-wrap:wrap;color:#fff;padding:10px 16px;
  background:linear-gradient(180deg,rgba(255,255,255,.06),rgba(0,0,0,.14));border-radius:12px;border:1px solid rgba(255,255,255,.15)}
.brand{display:flex;flex-direction:column;gap:2px;min-width:220px}
.brand-title{font-size:22px;font-weight:950;letter-spacing:.02em;color:var(--gold);text-shadow:0 2px 0 rgba(0,0,0,.4)}
.brand-sub{font-size:12.5px;font-weight:800;color:#d9ece7}
.head-progress-wrap{flex:1;min-width:160px;display:flex;flex-direction:column;gap:4px}
.head-progress-label{font-size:11.5px;color:#cfe4de;font-weight:800}
.head-progress{height:14px;background:rgba(255,255,255,.18);border-radius:999px;overflow:hidden;box-shadow:inset 0 2px 4px rgba(0,0,0,.3)}
.head-progress-fill{height:100%;width:0;background:linear-gradient(90deg,#f3c47a,var(--gold-dark));border-radius:999px;transition:width .4s}
.head-reset{padding:9px 14px;border:1.5px solid rgba(255,255,255,.55);border-radius:8px;background:rgba(0,0,0,.2);color:#fff;font-size:12.5px;font-weight:800;cursor:pointer;white-space:nowrap}
.head-reset:hover{background:rgba(255,255,255,.12)}
a.head-reset{text-decoration:none;display:inline-flex;align-items:center}
.head-reset.home-badge{width:38px;height:38px;padding:0;border-radius:50%;justify-content:center;background:radial-gradient(circle at 35% 30%, rgba(217,164,65,.5), rgba(10,40,38,1) 75%);border:1.5px solid var(--gold);box-shadow:0 0 0 3px rgba(0,0,0,.25),0 0 10px -2px var(--gold);font-size:18px}
.head-reset.home-badge:hover{box-shadow:0 0 0 3px rgba(0,0,0,.25),0 0 16px 0 var(--gold);background:rgba(0,0,0,.12);transform:translateY(-2px) scale(1.07)}

/* Header actions (home badge / reset / nav toggle) */
.header-actions{display:flex;align-items:center;gap:10px;margin-left:auto;flex-shrink:0}

/* Layout — off-canvas drawer pattern shared with the other quest games */
.game-layout{display:grid;grid-template-columns:230px minmax(0,1fr);gap:14px;align-items:start;transition:grid-template-columns .25s ease}
.side-backdrop{display:none}

/* Sidebar */
.side-panel{background:linear-gradient(180deg,rgba(17,107,70,.92),rgba(5,32,21,.95));border:1px solid rgba(255,255,255,.16);
  border-radius:12px;box-shadow:var(--shadow);overflow:hidden;position:sticky;top:10px;transition:width .25s ease}
.side-head{padding:12px 14px;font-size:13px;font-weight:900;color:#eaf6f2;border-bottom:1px solid rgba(255,255,255,.14);
  display:flex;align-items:center;gap:8px;min-height:20px}
.side-head-text{white-space:nowrap}
.side-toggle{width:32px;height:28px;border:1px solid rgba(255,255,255,.28);border-radius:7px;background:rgba(255,255,255,.10);
  color:#eaf6f2;font-weight:950;font-size:16px;cursor:pointer;line-height:1;flex-shrink:0}
.side-list{display:flex;flex-direction:column}
.side-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid rgba(255,255,255,.09);
  color:#c8ded7;cursor:pointer;user-select:none;touch-action:manipulation;min-width:0}
.side-item:hover{background:rgba(255,255,255,.06)}
.side-item.active{background:rgba(217,164,65,.2);box-shadow:inset 3px 0 0 var(--gold)}
.side-item.locked{opacity:.45;cursor:not-allowed}
.side-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.side-text{min-width:0}
.side-main{font-size:12.5px;font-weight:900;line-height:1.3;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.side-sub{font-size:10.5px;color:#a9c7be;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* collapsed (icon-rail / off-canvas) state, toggled via #app-shell.side-collapsed */
.app-shell.side-collapsed .game-layout{grid-template-columns:64px minmax(0,1fr)}
.app-shell.side-collapsed .side-panel{width:64px}
.app-shell.side-collapsed .side-head{justify-content:center;padding:8px 6px}
.app-shell.side-collapsed .side-head-text{display:none}
.app-shell.side-collapsed .side-item{justify-content:center;padding:11px 6px}
.app-shell.side-collapsed .side-item .side-text{display:none}

/* Desktop: sidebar always fully expanded regardless of toggle state */
@media(min-width:901px){
  .app-shell.side-collapsed .game-layout{grid-template-columns:230px minmax(0,1fr) !important}
  .app-shell.side-collapsed .side-panel{width:auto !important}
  .app-shell.side-collapsed .side-head{justify-content:space-between !important;padding:12px 14px !important}
  .app-shell.side-collapsed .side-head-text{display:block !important}
  .app-shell.side-collapsed .side-item{justify-content:flex-start !important;padding:11px 14px !important}
  .app-shell.side-collapsed .side-item .side-text{display:block !important}
}
/* Tablet: collapsed = icon rail */
@media(max-width:900px){
  .game-layout{grid-template-columns:64px minmax(0,1fr);gap:8px}
  .app-shell:not(.side-collapsed) .game-layout{grid-template-columns:210px minmax(0,1fr)}
  .side-panel{position:sticky;top:8px}
}
/* Mobile: collapsed = fully hidden off-canvas drawer */
@media(max-width:700px){
  .game-layout{grid-template-columns:1fr}
  .app-shell.side-collapsed .game-layout,
  .app-shell:not(.side-collapsed) .game-layout{grid-template-columns:1fr}
  .side-panel{position:fixed;top:0;left:0;width:min(82vw,300px);height:100vh;height:100dvh;
    border-radius:0;transform:translateX(-100%);transition:transform .25s ease;
    box-shadow:10px 0 30px rgba(0,0,0,.45);overflow-y:auto;z-index:80}
  .app-shell.side-collapsed .side-panel{transform:translateX(-100%)}
  .app-shell:not(.side-collapsed) .side-panel{transform:translateX(0)}
  .side-backdrop{display:none;position:fixed;inset:0;background:rgba(6,12,18,.55);z-index:70}
  .app-shell:not(.side-collapsed) .side-backdrop{display:block}
  .game-header{padding:8px 12px}
}

/* Main area */
.main-area{background:var(--paper);border:1px solid #e3d8bd;border-radius:12px;padding:18px 18px 20px;box-shadow:var(--shadow);min-height:520px}
.chapter-head{margin-bottom:12px}
.chapter-badge{display:inline-block;background:linear-gradient(#e8c07f,var(--gold-dark));color:#3a2705;border-radius:7px;
  padding:4px 11px;font-size:12px;font-weight:950;letter-spacing:.02em;margin-right:8px;box-shadow:0 2px 0 rgba(0,0,0,.15)}
.chapter-title{display:inline;font-size:20px;font-weight:950;color:#1c2f2b}
.chapter-sub{font-size:13px;color:var(--muted);margin-top:4px;font-weight:700}

/* Dialogue */
.dialogue-scene{display:flex;flex-direction:column;gap:8px;margin:14px 0 16px}
.dialog-row{display:grid;grid-template-columns:96px minmax(0,1fr);gap:12px;align-items:stretch;border:1px solid var(--line);background:var(--paper2);border-radius:10px;padding:10px 12px;box-shadow:0 2px 0 rgba(0,0,0,.04)}
.dialog-row.right{grid-template-columns:minmax(0,1fr) 96px}
.dialog-row.right .dialog-character{order:2}
.dialog-row.right .dialog-bubble{order:1}
.dialog-character{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;min-width:0}
.dialog-avatar{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:30px;box-shadow:0 3px 6px rgba(0,0,0,.18);flex-shrink:0}
.dialog-avatar.coach{background:linear-gradient(#fde3d6,#f7c2a4)}
.dialog-avatar.stu{background:linear-gradient(#dcefe9,#b9dcd0)}
.dialog-name{padding:3px 10px;border-radius:7px;color:#fff;font-weight:900;font-size:11px;line-height:1.2;box-shadow:0 2px 0 rgba(0,0,0,.16);white-space:nowrap;text-align:center}
.dialog-name.coach{background:linear-gradient(#f0b868,#c19a3a)}
.dialog-name.stu{background:linear-gradient(#5cc2ab,#2f8f78)}
.dialog-bubble{position:relative;align-self:center;background:var(--paper);border:1px solid var(--line);border-radius:12px;padding:11px 14px;color:var(--ink);font-size:13.5px;line-height:1.75;font-weight:700;min-height:56px;display:flex;flex-direction:column;justify-content:center}
.dialog-bubble::before{content:"";position:absolute;left:-10px;top:50%;transform:translateY(-50%);width:0;height:0;border-top:8px solid transparent;border-bottom:8px solid transparent;border-right:10px solid var(--line)}
.dialog-bubble::after{content:"";position:absolute;left:-8px;top:50%;transform:translateY(-50%);width:0;height:0;border-top:7px solid transparent;border-bottom:7px solid transparent;border-right:9px solid var(--paper)}
.dialog-row.right .dialog-bubble::before{left:auto;right:-10px;border-right:0;border-left:10px solid var(--line)}
.dialog-row.right .dialog-bubble::after{left:auto;right:-8px;border-right:0;border-left:9px solid var(--paper)}
@media (max-width:700px){
  .dialog-row,.dialog-row.right{grid-template-columns:74px minmax(0,1fr);padding:8px;gap:8px}
  .dialog-row.right .dialog-character{order:0}
  .dialog-row.right .dialog-bubble{order:1}
  .dialog-avatar{width:52px;height:52px;font-size:24px}
  .dialog-name{font-size:9.5px;padding:3px 7px}
  .dialog-bubble{font-size:13px;padding:9px 11px;min-height:0}
  .dialog-row.right .dialog-bubble::before{left:-10px;right:auto;border-left:0;border-right:10px solid var(--line)}
  .dialog-row.right .dialog-bubble::after{left:-8px;right:auto;border-left:0;border-right:9px solid var(--paper)}
}

/* Mission box */
.mission-box{background:linear-gradient(180deg,#fff8e6,#fdefc9);border:1px solid #e3c877;border-radius:10px;padding:12px 14px;margin-bottom:14px}
.mission-label{font-size:11.5px;font-weight:950;color:#8a6614;margin-bottom:3px}
.mission-text{font-size:13.5px;color:#3a2c08;font-weight:700;line-height:1.6}
.mission-status{display:inline-block;margin-top:8px;padding:3px 11px;border-radius:999px;font-size:11.5px;font-weight:900;
  background:#eee1bd;color:#8a6614}
.mission-status.ok{background:var(--ok-bg);color:var(--ok);border:1px solid var(--ok-bd)}

/* Stage nav / buttons */
.stage-nav{display:flex;justify-content:flex-end;gap:10px;margin-top:18px;flex-wrap:wrap}
.btn{border:1px solid #c9bda0;background:#fff;border-radius:8px;padding:.65rem 1.2rem;font-size:13.5px;cursor:pointer;
  color:var(--ink);font-family:var(--f);font-weight:800;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.btn:hover{background:#f4efe0}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:linear-gradient(#d9a441,#a6742a);border-color:#8f5518;color:#fff;box-shadow:0 3px 0 #6f430f}
.btn-primary:hover{opacity:.92;background:linear-gradient(#d9a441,#a6742a)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}

/* Generic choice buttons / quiz */
.choice-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.choice-btn{border:1.5px solid #b6c9c2;background:#fff;border-radius:8px;padding:.55rem 1rem;font-size:13px;font-weight:800;
  cursor:pointer;color:#20463d;touch-action:manipulation;text-align:left}
.choice-btn:hover{background:#eef7f3}
.choice-btn.choice-ok{background:var(--ok-bg);border-color:var(--ok-bd);color:var(--ok)}
.choice-btn.choice-ng{background:var(--ng-bg);border-color:var(--ng-bd);color:var(--ng)}
.quiz-q{font-size:13.5px;font-weight:850;color:#1c2f2b;margin-top:4px}
.quiz-head{font-size:14px;font-weight:950;color:#1c2f2b;margin:18px 0 10px;padding-top:10px;border-top:1px dashed var(--line)}
.quiz-card{background:linear-gradient(180deg,#fff,var(--paper2));border:1px solid var(--line);border-radius:10px;padding:12px 14px;margin-bottom:10px}
.quiz-card .hand-row,.quiz-card .vs-row,.quiz-card .hand-block{margin-bottom:8px}
.quiz-explain{margin-top:9px;font-size:12.5px;line-height:1.6;color:#3a2c08;background:#fff8e6;border:1px solid #e3c877;border-radius:8px;padding:8px 10px}

/* Playing cards */
.hand-row{display:flex;flex-wrap:wrap;gap:6px}
.hand-block{margin-bottom:10px}
.hand-label{font-size:11px;font-weight:900;color:var(--muted);margin-bottom:5px}
.pcard{width:48px;height:66px;background:#fff;border:1px solid #cfc4a4;border-radius:7px;box-shadow:0 2px 3px rgba(0,0,0,.18);
  display:flex;flex-direction:column;justify-content:space-between;padding:4px 5px;flex-shrink:0}
.pcard-corner{font-size:12px;font-weight:900;line-height:1}
.pcard-suit-big{font-size:22px;text-align:center;line-height:1}
.pcard.red{color:var(--cred)}
.pcard.black{color:var(--cblack)}

/* Reference table (stage 1) */
.ref-head{font-size:14px;font-weight:950;color:#1c2f2b;margin-bottom:10px}
.ref-table{display:flex;flex-direction:column;gap:6px;margin-bottom:8px}
.ref-row{display:grid;grid-template-columns:26px auto minmax(0,1fr);gap:12px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:8px;padding:8px 10px}
.ref-rank{font-size:12px;font-weight:950;color:#fff;background:var(--gold-dark);border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center}
.ref-cards{display:flex;gap:3px}
.ref-cards .pcard{width:34px;height:47px;padding:2px 3px}
.ref-cards .pcard-corner{font-size:9px}
.ref-cards .pcard-suit-big{font-size:15px}
.ref-name{font-size:12.5px;font-weight:900;color:#1c2f2b}
.ref-desc{font-size:11px;color:var(--muted);margin-top:1px}
@media(max-width:560px){.ref-row{grid-template-columns:22px minmax(0,1fr);grid-template-areas:"n c" ". i"}
  .ref-rank{grid-area:n}.ref-cards{grid-area:c}.ref-info{grid-area:i}}

/* Interactive Hold'em flow diagram + stepper (stage 3: holdem rules) */
.pcard.back{background:repeating-linear-gradient(45deg,var(--felt),var(--felt) 4px,var(--felt-dark) 4px,var(--felt-dark) 8px);border-color:rgba(255,255,255,.35)}
.pcard.back.dim{opacity:.35}
.holdem-diagram{padding:16px}
.holdem-phase-tag{display:inline-block;font-size:10.5px;font-weight:950;color:#123;background:#e8c07f;border-radius:5px;padding:2px 9px;margin-bottom:8px}
.holdem-flow-banner{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:14px;font-weight:900;color:#fff;margin-bottom:10px}
.action-pill{display:inline-block;padding:2px 10px;border-radius:999px;font-size:11px;font-weight:950;color:#fff;flex-shrink:0}
.action-pill.deal,.action-pill.board{background:#6b7280}
.action-pill.sb,.action-pill.bb{background:#4d7fc9}
.action-pill.check{background:#6b7280}
.action-pill.bet{background:#b8791f}
.action-pill.call{background:#2f9e5c}
.action-pill.raise{background:#c1443a}
.action-pill.fold{background:#7a3530}
.action-pill.showdown{background:var(--gold-dark)}
.holdem-pot{text-align:center;color:#f3d99a;font-weight:950;font-size:14px;margin-bottom:10px}
.holdem-board-row{display:flex;justify-content:center;gap:6px;flex-wrap:wrap}
.holdem-seats{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin-top:16px}
.holdem-seat{display:flex;flex-direction:column;align-items:center;gap:6px;background:rgba(0,0,0,.22);border-radius:10px;padding:10px 12px;min-width:108px;transition:opacity .2s}
.holdem-seat.you{background:rgba(217,164,65,.22);border:1px solid var(--gold)}
.holdem-seat.winner{outline:2px solid #8ef0b0;box-shadow:0 0 0 3px rgba(142,240,176,.25)}
.holdem-seat.folded{opacity:.45}
.holdem-seat-name{color:#fff;font-size:11.5px;font-weight:900;white-space:nowrap}
.holdem-seat-cards{display:flex;gap:3px}
.holdem-seat-cards .pcard{width:34px;height:47px;padding:2px 3px}
.holdem-seat-cards .pcard-corner{font-size:9px}
.holdem-seat-cards .pcard-suit-big{font-size:15px}
.holdem-seat-chip{font-size:10.5px;color:#f3d99a;font-weight:800;background:rgba(0,0,0,.3);border-radius:999px;padding:2px 10px;min-height:16px;text-align:center;white-space:nowrap}
.holdem-seat-chip.chip-blind{background:rgba(77,127,201,.6);color:#fff}
.holdem-seat-chip.chip-check{background:rgba(107,114,128,.55);color:#fff}
.holdem-seat-chip.chip-bet{background:rgba(184,121,31,.65);color:#fff}
.holdem-seat-chip.chip-call{background:rgba(47,158,92,.6);color:#fff}
.holdem-seat-chip.chip-raise{background:rgba(193,68,58,.65);color:#fff}
.holdem-seat-chip.chip-fold{background:rgba(122,53,48,.6);color:#fff}
.holdem-caption{color:#e5f2eb;font-size:12.5px;line-height:1.7;margin-top:14px;background:rgba(0,0,0,.2);border-radius:8px;padding:10px 12px}
.step-controls{display:flex;align-items:center;justify-content:center;gap:14px;margin:14px 0}
.step-progress{font-size:12px;color:var(--muted);font-weight:800;min-width:60px;text-align:center}

/* Main pot / side pot mini-diagram (all-in scenario) */
.action-pill.allin{background:#8b3fae}
.action-pill.split{background:#8b3fae}
.holdem-seat-chip.chip-allin{background:rgba(139,63,174,.65);color:#fff}
.holdem-seat-stack{font-size:10px;color:#a9c7be;margin-top:-2px}
.pot-split-row{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;margin-bottom:4px}
.pot-split-box{background:rgba(0,0,0,.25);border-radius:10px;padding:8px 18px;text-align:center;min-width:120px}
.pot-split-box.side{background:rgba(139,63,174,.22)}
.pot-split-label{font-size:10.5px;color:#cfe4de;font-weight:800}
.pot-split-amount{font-size:17px;color:#f3d99a;font-weight:950}
.pot-split-eligible{font-size:10px;color:#a9c7be;margin-top:2px;line-height:1.5}
.holdem-seat-result-tag{display:inline-block;font-size:9.5px;font-weight:950;color:#123;background:#8ef0b0;border-radius:5px;padding:1px 7px;margin-top:4px}
.holdem-seat-result-tag.side{background:#d8b6f0}

.action-grid{display:grid;grid-template-columns:1fr;gap:6px;margin-top:6px}
@media(min-width:520px){.action-grid{grid-template-columns:1fr 1fr}}
.action-item{font-size:12.5px;line-height:1.6}
.action-item b{color:#8a6614}

/* Compare (stage 2) */
.vs-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.vs-divider{font-size:13px;font-weight:950;color:var(--gold-dark);flex-shrink:0}

/* Chen formula box (stage 4) */
.chen-box{background:linear-gradient(180deg,#fff8e6,#fdefc9);border:1px solid #e3c877;border-radius:10px;padding:12px 14px;margin-bottom:16px;font-size:12.5px;line-height:1.9;color:#3a2c08}
.chen-box b{color:#8a6614}

/* Bet sizing stage: concrete 3-trial worked example */
.bluff-trials{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.bluff-trial{display:grid;grid-template-columns:1fr 70px;grid-template-areas:"label result" "desc desc";gap:2px 12px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:8px;padding:10px 12px}
.bluff-trial-label{grid-area:label;font-size:12.5px;font-weight:900;color:#1c2f2b}
.bluff-trial-result{grid-area:result;font-size:20px;font-weight:950;text-align:right}
.bluff-trial-result.plus{color:var(--ok)}
.bluff-trial-result.minus{color:var(--ng)}
.bluff-trial-desc{grid-area:desc;font-size:11.5px;color:var(--muted);line-height:1.5}

<script>
'use strict';

/* =====================================================================
   utilities
   ===================================================================== */
function qs(sel, root){ return (root||document).querySelector(sel); }
function escapeHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function randInt(min,max){ return min + Math.floor(Math.random()*(max-min+1)); }
function pick(arr){ return arr[randInt(0,arr.length-1)]; }
function shuffleArr(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){ const j=randInt(0,i); [a[i],a[j]]=[a[j],a[i]]; } return a; }
function sampleN(arr,n){ return shuffleArr(arr).slice(0,n); }

/* =====================================================================
   glossary: tap a jargon term anywhere in the page to see its definition.
   linkGlossaryIn() walks the rendered text of a container and wraps any
   matching term in a clickable span; a single delegated click listener
   (set up once at boot) shows a positioned tooltip. Re-running
   linkGlossaryIn on already-linked content is a no-op (it skips text
   nodes whose ancestor is already a .glossary-term), so callers can
   call it freely after every re-render without worrying about double-wrapping.
   ===================================================================== */
const GLOSSARY = {
  'ホールカード': '自分だけに配られる、他のプレイヤーには見せない2枚の手札。',
  'コミュニティカード': 'テーブル中央に公開される、全員で共有するカード(フロップ3枚+ターン1枚+リバー1枚の計5枚)。',
  'プリフロップ': 'ホールカードが配られた直後、コミュニティカードがまだ1枚も公開されていない最初のベッティングラウンド。手札2枚だけを頼りに判断する。',
  'ポストフロップ': 'フロップが公開されて以降の総称。フロップ・ターン・リバーの3つのベッティングラウンドをまとめてこう呼ぶ。手札に加えて公開されたコミュニティカードの情報も使って判断できる。',
  'フロップ': '最初に公開される3枚のコミュニティカード。ここから2回目のベッティングラウンドが始まる。',
  'ターン': 'フロップの次に公開される4枚目のコミュニティカード。',
  'リバー': '最後に公開される5枚目のコミュニティカード。',
  'ショーダウン': '最後まで残ったプレイヤー同士でカードを見せ合い、役の強さを比べること。',
  'キッカー': '役の直接の構成には使わない、残りのカード。同じ役同士の勝敗を決める材料になる。',
  'スーテッド': '2枚の手札が同じスート(マーク)であること。役や強さの計算にプラスに働く。',
  'コネクター': '2枚の手札の数字が連続していること(例：9と8)。ストレートを狙いやすい。',
  'ブラインド': 'プリフロップで強制的に賭けさせられる少額のベット。',
  'スモールブラインド': 'ブラインドのうち少ない方の額。ボタンの次に座る人が払う。',
  'ビッグブラインド': 'ブラインドのうち多い方の額。スモールブラインドの次に座る人が払う。',
  'オールイン': '残っているチップをすべて賭けること。それ以上は賭けようがない。',
  'メインポット': 'オールインが起きたとき、参加者全員が獲得資格を持つポットの部分。',
  'サイドポット': 'オールインした人より多く賭けた人たちだけが獲得資格を持つ、追加のポット。',
  'ポジション': 'テーブル上の座席の位置。行動する順番と、得られる情報量を左右する。',
  'ボタン': 'ディーラー役を示す印。この位置にいる人は、フロップ以降は常に最後に行動できる。',
  'アウツ': '今の手札を、より強い役に完成させてくれる残りのカードの枚数。',
  'ドロー': '役があと少しで完成しそうな、未完成の状態。',
  'ポットオッズ': 'コールに必要な金額と、獲得できるポットの大きさの比率から計算する「必要勝率」。',
  'エクイティ': '今の時点での、自分が最終的に勝てる見込みの確率。',
  '期待値': '長期的に見たときの、平均的な損得の見込み。プラスなら得(+EV)、マイナスなら損(-EV)。',
  'レンジ': '相手が持っている可能性のある手札の範囲(分布)。1つの手に決め打ちしない考え方。',
  'ハンドリーディング': '相手の行動から、持っている手札のレンジを読み取る技術。',
  'ブラフ': '弱い手なのに強い手のふりをして、相手を降ろさせるための賭け方。',
};
const GLOSSARY_REGEX = new RegExp('(' + Object.keys(GLOSSARY).sort((a,b)=>b.length-a.length).map(t=>t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('|') + ')');
function linkGlossaryIn(root){
  if(!root) return;
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT);
  const targets = [];
  let node;
  while((node = walker.nextNode())){
    if(!node.nodeValue || !GLOSSARY_REGEX.test(node.nodeValue)) continue;
    let el = node.parentElement, skip = false;
    while(el && el!==root){
      if(el.tagName==='BUTTON' || el.classList.contains('glossary-term') || el.classList.contains('choice-btn')){ skip = true; break; }
      el = el.parentElement;
    }
    if(!skip) targets.push(node);
  }
  targets.forEach(textNode=>{
    const parts = textNode.nodeValue.split(GLOSSARY_REGEX);
    if(parts.length<=1) return;
    // Wrap everything in a single inline <span> (not a bare DocumentFragment) so
    // that replacing the one original text node still leaves exactly one child
    // in the parent — this matters because several containers in this app use
    // display:flex (e.g. .dialog-bubble), where multiple top-level sibling
    // nodes would each become their own flex item and stack on separate lines.
    const wrap = document.createElement('span');
    parts.forEach((part,i)=>{
      if(!part) return;
      if(i%2===1){
        const span = document.createElement('span');
        span.className = 'glossary-term';
        span.textContent = part;
        span.dataset.term = part;
        wrap.appendChild(span);
      } else {
        wrap.appendChild(document.createTextNode(part));
      }
    });
    textNode.parentNode.replaceChild(wrap, textNode);
  });
}
function showGlossaryTooltip(span){
  const def = GLOSSARY[span.dataset.term];
  if(!def) return;
  let tip = document.getElementById('glossary-tooltip');
  if(!tip){
    tip = document.createElement('div');
    tip.id = 'glossary-tooltip';
    tip.innerHTML = '<button class="gt-close" aria-label="閉じる">✕</button><div class="gt-term"></div><div class="gt-def"></div>';
    document.body.appendChild(tip);
    tip.querySelector('.gt-close').addEventListener('click', (e)=>{ e.stopPropagation(); hideGlossaryTooltip(); });
  }
  tip.querySelector('.gt-term').textContent = span.dataset.term;
  tip.querySelector('.gt-def').textContent = def;
  tip.classList.remove('show'); tip.style.visibility = 'hidden'; tip.classList.add('show');
  const rect = span.getBoundingClientRect();
  const tw = tip.offsetWidth, th = tip.offsetHeight;
  let left = rect.left, top = rect.bottom + 6;
  if(left + tw > window.innerWidth - 8) left = window.innerWidth - tw - 8;
  if(left < 8) left = 8;
  if(top + th > window.innerHeight - 8) top = rect.top - th - 6;
  if(top < 8) top = 8;
  tip.style.left = left + 'px';
  tip.style.top = top + 'px';
  tip.style.visibility = '';
}
function hideGlossaryTooltip(){
  const tip = document.getElementById('glossary-tooltip');
  if(tip) tip.classList.remove('show');
}
document.addEventListener('click', (e)=>{
  const term = e.target.closest('.glossary-term');
  if(term){ e.stopPropagation(); showGlossaryTooltip(term); return; }
  if(!e.target.closest('#glossary-tooltip')) hideGlossaryTooltip();
});

/* =====================================================================
   card model
   ===================================================================== */
const SUITS = ['s','h','d','c'];
const SUIT_SYMBOL = {s:'♠',h:'♥',d:'♦',c:'♣'};
function mkCard(rank,suit){ return {rank,suit}; }
function rankLabel(r){ return r===14?'A': r===13?'K': r===12?'Q': r===11?'J': String(r); }
function cardHtml(card){
  const red = card.suit==='h'||card.suit==='d';
  return `<div class="pcard ${red?'red':'black'}"><div class="pcard-corner">${rankLabel(card.rank)}${SUIT_SYMBOL[card.suit]}</div><div class="pcard-suit-big">${SUIT_SYMBOL[card.suit]}</div></div>`;
}
function freshDeck(){ const d=[]; SUITS.forEach(s=>{ for(let r=2;r<=14;r++) d.push(mkCard(r,s)); }); return d; }
function randDistinctRanks(n){
  const pool=[]; for(let r=2;r<=14;r++) pool.push(r);
  return sampleN(pool,n);
}

/* =====================================================================
   hand evaluator (verified against brute-force outs counting & many
   randomized category checks before shipping)
   ===================================================================== */
function evaluate5(cards){
  const ranksSorted = cards.map(c=>c.rank).sort((a,b)=>b-a);
  const suits = cards.map(c=>c.suit);
  const isFlush = suits.every(s=>s===suits[0]);
  const uniqueRanks = [...new Set(ranksSorted)];
  let isStraight=false, straightHigh=0;
  if(uniqueRanks.length===5){
    if(uniqueRanks[0]-uniqueRanks[4]===4){ isStraight=true; straightHigh=uniqueRanks[0]; }
    else if(JSON.stringify(uniqueRanks)===JSON.stringify([14,5,4,3,2])){ isStraight=true; straightHigh=5; }
  }
  const counts = {};
  ranksSorted.forEach(r=>counts[r]=(counts[r]||0)+1);
  const groups = Object.entries(counts).map(([r,c])=>({rank:Number(r),count:c}))
     .sort((a,b)=> b.count-a.count || b.rank-a.rank);

  if(isStraight && isFlush) return {cat:8, tie:[straightHigh]};
  if(groups[0].count===4) return {cat:7, tie:[groups[0].rank, groups[1].rank]};
  if(groups[0].count===3 && groups[1] && groups[1].count>=2) return {cat:6, tie:[groups[0].rank, groups[1].rank]};
  if(isFlush) return {cat:5, tie:ranksSorted};
  if(isStraight) return {cat:4, tie:[straightHigh]};
  if(groups[0].count===3) return {cat:3, tie:[groups[0].rank, ...groups.slice(1).map(g=>g.rank)]};
  if(groups[0].count===2 && groups[1] && groups[1].count===2){
    const kicker = groups[2].rank;
    return {cat:2, tie:[groups[0].rank, groups[1].rank, kicker]};
  }
  if(groups[0].count===2) return {cat:1, tie:[groups[0].rank, ...groups.slice(1).map(g=>g.rank)]};
  return {cat:0, tie:ranksSorted};
}
function compareEval(a,b){
  if(a.cat!==b.cat) return a.cat-b.cat;
  for(let i=0;i<Math.max(a.tie.length,b.tie.length);i++){
    const av=a.tie[i]||0, bv=b.tie[i]||0;
    if(av!==bv) return av-bv;
  }
  return 0;
}
function kCombinations(arr, k){
  const results=[];
  function helper(start, combo){
    if(combo.length===k){ results.push([...combo]); return; }
    for(let i=start;i<arr.length;i++){ combo.push(arr[i]); helper(i+1,combo); combo.pop(); }
  }
  helper(0,[]);
  return results;
}
function bestOf(cards){
  const combos = cards.length===5 ? [cards] : kCombinations(cards,5);
  let best=null, bestCombo=null;
  combos.forEach(c=>{ const e=evaluate5(c); if(!best || compareEval(e,best)>0){ best=e; bestCombo=c; } });
  return {eval:best, cards:bestCombo};
}
const CAT_NAMES = ['ハイカード','ワンペア','ツーペア','スリーカード','ストレート','フラッシュ','フルハウス','フォーカード','ストレートフラッシュ'];
function catDisplayName(ev){ return (ev.cat===8 && ev.tie[0]===14) ? 'ロイヤルフラッシュ' : CAT_NAMES[ev.cat]; }

/* =====================================================================
   simplified Chen-formula starting hand score
   ===================================================================== */
function cardVal(r){ if(r===14) return 10; if(r===13) return 8; if(r===12) return 7; if(r===11) return 6; return r/2; }
function chenScore(r1,r2,suited){
  const hi=Math.max(r1,r2), lo=Math.min(r1,r2);
  let score = cardVal(hi);
  if(r1===r2){ return Math.max(score*2, 5); }
  if(suited) score += 2;
  const gap = hi-lo-1;
  if(gap===1) score-=1; else if(gap===2) score-=2; else if(gap===3) score-=4; else if(gap>=4) score-=5;
  if(gap<=1 && hi<=12) score+=1;
  return Math.max(score,0);
}
function classifyBucket(score){ if(score>=10) return 'premium'; if(score>=7) return 'strong'; if(score>=5) return 'playable'; return 'weak'; }

/* =====================================================================
   dialogue renderer
   ===================================================================== */
function renderDialogue(lines){
  return lines.map(l=>{
    const isStu = l.who === 'stu';
    const icon = l.who==='coach' ? '🎩' : '🔰';
    const name = l.who==='coach' ? 'コーチ' : 'ミカ（見習い）';
    return `<div class="dialog-row${isStu?' right':''}">
      <div class="dialog-character"><div class="dialog-avatar ${l.who}">${icon}</div><div class="dialog-name ${l.who}">${name}</div></div>
      <div class="dialog-bubble">${l.text}</div>
    </div>`;
  }).join('');
}

/* =====================================================================
   generic MCQ quiz block — every card must be answered correctly on
   the first click for the stage's onDone callback to fire; a wrong
   click locks that card until the whole stage is retried.
   ===================================================================== */
function renderQuizArea(container, quizzes, onDone){
  container.innerHTML = quizzes.map((q,qi)=>`
    <div class="quiz-card" data-qi="${qi}">
      ${q.visual || ''}
      <div class="quiz-q">Q${qi+1}. ${q.q}</div>
      <div class="choice-list">${q.choices.map((c,ci)=>`<button class="choice-btn" data-qi="${qi}" data-ci="${ci}">${escapeHtml(c)}</button>`).join('')}</div>
      <div class="quiz-explain" style="display:none"></div>
    </div>`).join('');
  linkGlossaryIn(container);
  const solved = new Set();
  container.querySelectorAll('.choice-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      const qi = Number(btn.dataset.qi), ci = Number(btn.dataset.ci);
      const card = container.querySelector(`.quiz-card[data-qi="${qi}"]`);
      if(card.classList.contains('answered')) return;
      const q = quizzes[qi];
      const isOk = ci === q.correct;
      card.querySelectorAll('.choice-btn').forEach((b,i)=>{
        if(i===q.correct) b.classList.add('choice-ok');
        else if(i===ci && !isOk) b.classList.add('choice-ng');
      });
      card.classList.add('answered');
      const ex = card.querySelector('.quiz-explain');
      ex.style.display = 'block';
      ex.innerHTML = (isOk ? '✅ 正解。 ' : '❌ 不正解。 ') + q.explain;
      linkGlossaryIn(ex);
      if(isOk){ solved.add(qi); if(solved.size === quizzes.length) onDone(); }
    });
  });
}

/* =====================================================================
   Stage 3: スターティングハンド評価
   ===================================================================== */
function buildStarting(root, ctx){
  const BUCKET_LABELS = {premium:'プレミアム(積極的に勝負)', strong:'強い(基本参加)', playable:'普通(状況次第)', weak:'弱い(基本は降りる)'};
  const order = ['premium','strong','playable','weak'];
  const targets = ['premium','strong','playable','weak','strong','weak'];
  const quizzes = targets.map(target=>{
    let r1,r2,suited,score,bucket, tries=0;
    do{
      const ranks = randDistinctRanks(2);
      if(Math.random()<0.15){ r1=ranks[0]; r2=ranks[0]; suited=false; }
      else { r1=ranks[0]; r2=ranks[1]; suited = Math.random()<0.4; }
      score = chenScore(r1,r2,suited);
      bucket = classifyBucket(score);
      tries++;
    } while(bucket!==target && tries<800);
    const cardObjs = (r1===r2) ? [mkCard(r1,'s'),mkCard(r2,'h')]
      : suited ? [mkCard(r1,'s'),mkCard(r2,'s')] : [mkCard(r1,'s'),mkCard(r2,'h')];
    const choices = shuffleArr(order.map(o=>BUCKET_LABELS[o]));
    const correctLabel = BUCKET_LABELS[bucket];
    return {
      visual: `<div class="hand-row">${cardObjs.map(cardHtml).join('')}</div>`,
      q: 'このハンド、強さのランクは？',
      choices,
      correct: choices.indexOf(correctLabel),
      explain: `簡易スコア ${score.toFixed(1)}点 → 「${correctLabel}」に分類されます。`,
    };
  });
  root.innerHTML = `
    <div class="chen-box">
      <b>簡易チェン・フォーミュラ</b>の考え方(プロが使う点数化を簡略化したもの)<br>
      ① 高い方のカードの点数：A=10 / K=8 / Q=7 / J=6 / 10以下=数字÷2<br>
      ② ペアなら①の点数を2倍(最低5点)<br>
      ③ スーテッド(同じスート)なら+2点<br>
      ④ 2枚の数字差(ギャップ)で減点：連続(コネクター)は減点なし／1つ飛びは-1点／2つ飛びは-2点／3つ飛びは-4点／4つ以上飛ぶと-5点<br>
      ⑤ ギャップ1以下(連続または1つ飛び)かつ高い方がQ以下ならストレートが狙いやすいので+1点<br>
      → <b>10点以上=プレミアム／7点以上=強い／5点以上=普通／それ未満=弱い</b>
    </div>
    ${ctx.missionBoxHtml}
    <div class="quiz-head">✏️ クイズ：ハンドの強さを判定しよう</div>
    <div id="quiz-area"></div>
  `;
  renderQuizArea(qs('#quiz-area', root), quizzes, ctx.complete);
}

const OUTS_SCENARIOS = [
  { hole:[[14,'s'],[13,'s']], board:[[12,'s'],[7,'s'],[2,'h']], outs:9, streets:2, draw:'フラッシュドロー' },
  { hole:[[9,'d'],[8,'c']], board:[[7,'s'],[6,'h'],[2,'d']], outs:8, streets:2, draw:'オープンエンド・ストレートドロー' },
  { hole:[[11,'h'],[10,'s']], board:[[9,'d'],[7,'c'],[2,'s']], outs:4, streets:2, draw:'ガットショット(インサイド)ドロー' },
  { hole:[[14,'h'],[5,'h']], board:[[13,'h'],[9,'h'],[4,'c'],[2,'d']], outs:9, streets:1, draw:'フラッシュドロー(ターン)' },
  { hole:[[11,'s'],[10,'s']], board:[[9,'s'],[8,'h'],[2,'s']], outs:15, streets:2, draw:'コンボドロー(フラッシュ+ストレート)' },
];
function numericChoices(correct, spread, unit){
  const set = new Set([correct]);
  let guard=0;
  while(set.size<4 && guard<200){ guard++; const d = correct + randInt(-spread,spread); if(d>0 && d!==correct) set.add(d); }
  return shuffleArr([...set]).map(n=>n+unit);
}
function buildOuts(root, ctx){
  const quizzes = [];
  OUTS_SCENARIOS.forEach(sc=>{
    const hole = sc.hole.map(([r,s])=>mkCard(r,s));
    const board = sc.board.map(([r,s])=>mkCard(r,s));
    const pct = sc.outs * (sc.streets===2 ? 4 : 2);
    const visual = `<div class="hand-block"><div class="hand-label">ホールカード</div><div class="hand-row">${hole.map(cardHtml).join('')}</div></div>
      <div class="hand-block"><div class="hand-label">ボード(${sc.streets===2?'フロップ':'ターンまで'})</div><div class="hand-row">${board.map(cardHtml).join('')}</div></div>
      <div class="scenario-info">状況：<b>${sc.draw}</b></div>`;
    const outsChoicesArr = numericChoices(sc.outs, 4, '枚');
    quizzes.push({
      visual,
      q: 'この状況、役を完成させる「アウツ」は何枚？',
      choices: outsChoicesArr,
      correct: outsChoicesArr.indexOf(sc.outs+'枚'),
      explain: `残りのカードの中で役を完成させるのは${sc.outs}枚です。`,
    });
    const pctChoicesArr = numericChoices(pct, 12, '%').map(s=>'約'+s);
    quizzes.push({
      visual,
      q: `残り${sc.streets===2?'2枚(ターン・リバー)':'1枚(リバー)'}で完成する確率を「4-2ルール」(アウツ×${sc.streets===2?'4':'2'})で概算すると、およそ何％？`,
      choices: pctChoicesArr,
      correct: pctChoicesArr.indexOf('約'+pct+'%'),
      explain: `${sc.outs}枚 × ${sc.streets===2?'4':'2'} ≈ ${pct}%(4-2ルールによる概算値)。`,
    });
  });
  root.innerHTML = `${ctx.missionBoxHtml}<div class="quiz-head">✏️ クイズ：アウツとオッズを計算しよう</div><div id="quiz-area"></div>`;
  renderQuizArea(qs('#quiz-area', root), shuffleArr(quizzes), ctx.complete);
}

    <div class="chen-box">
      <b>ポットオッズだけでは見落とすもの</b><br>
      前のステージの「必要勝率」は、<b>今のポットと今のベット</b>だけを見た計算だった。
      でも実際は、役が完成した後にもう1回・2回とベッティングラウンドが残っていることが多い。
      相手が強い手を持っていれば、そこでさらにお金を払ってくれる(＝あなたが追加で獲得できる)かもしれない。
      この「将来の見込み」まで加味した考え方が<b>インプライドオッズ</b>。
    </div>
    <div class="chen-box">
      <b>公式は、必要勝率の式に「見込める追加獲得額」を足すだけ</b><br>
      必要勝率(インプライドオッズ版) = ベット額 ÷ (ポット + ベット額 + 見込める追加獲得額) × 100<br>
      例：ポット100・ベット50 → 普通の必要勝率は 50/(100+50)≈<b>33%</b>。もし完成後にさらに100を見込めるなら、
      50/(100+50+100)≈<b>20%</b>まで下がる。勝率30%のドローなら、普通のポットオッズでは<b>フォールド</b>だったのに、
      インプライドオッズで考えると<b>コール</b>に変わる。
    </div>
    ${ctx.missionBoxHtml}
    <div class="quiz-head">✏️ クイズ：インプライドオッズで判断しよう</div>
    <div id="quiz-area"></div>
  `;
  renderQuizArea(qs('#quiz-area', root), quizzes, ctx.complete);
}

/* =====================================================================
   Stage: レンジ思考とハンドリーディング
   (range grid derived from the same simplified Chen formula used in
   the starting-hand stage — thresholds verified in Node: score>=7 covers
   40/169 combo-classes, score>=5 covers 80/169)
   ===================================================================== */
function rangeGridHtml(threshold, title){
  let cells = '';
  for(let i=0;i<13;i++){
    for(let j=0;j<13;j++){
      const a=14-i, b=14-j;
      const hi=Math.max(a,b), lo=Math.min(a,b), suited=(a!==b) && (i<j);
      const score = a===b ? chenScore(a,a,false) : chenScore(hi,lo,suited);
      const included = score>=threshold;
      const bucket = classifyBucket(score);
      const label = a===b ? `${rankLabel(a)}${rankLabel(a)}` : (i<j ? `${rankLabel(hi)}${rankLabel(lo)}s` : `${rankLabel(hi)}${rankLabel(lo)}o`);
      cells += `<div class="range-cell ${included ? 'bucket-'+bucket : 'bucket-out'}">${label}</div>`;
    }
  }
  return `<div class="range-grid-block"><div class="range-grid-title">${title}</div><div class="range-grid">${cells}</div></div>`;
}
function buildRange(root, ctx){
  const quizzes = [
    {q:'レンジ表で「含まれるハンドの割合」が広いのは、アーリーとレイトのどちらのポジションが基本？',

      choices:['A♠A♥(プレミアム)','7♠2♥(弱い)'], correct:0,
      explain:'アーリーポジションは情報が少なく不利なので、AAのようなプレミアムハンドに絞って参加するのが基本。'},
    {q:'レイトポジションの広いレンジには含まれるが、アーリーポジションの狭いレンジには含まれない可能性が高いのは？',
      choices:['K♠K♥(プレミアム)','8♠6♠(普通クラス)'], correct:1,
      explain:'86sのような「普通」クラスのハンドは、情報優位のあるレイトポジションでは参加圏内だが、アーリーポジションでは見送られやすい。KKはどちらのレンジにも入るプレミアムハンド。'},
    {q:'相手がアーリーポジションから参加してきた場合と、レイトポジションから参加してきた場合、平均してハンドが強いと推測すべきなのは？',
      choices:['レイトポジションから参加してきた方','どちらも同じ','アーリーポジションから参加してきた方'], correct:2,
      explain:'アーリーポジションはレンジが狭い(強いハンドに絞られている)ぶん、参加してきたこと自体が「平均して強いハンド」のサインになりやすい。'},
    {q:'「1つの決め打ちのハンド」ではなく「レンジ(分布)」で相手を考える一番の利点は？',
      choices:['相手の手が100%分かるようになる','情報が少なくても、判断の精度を上げられる','ポットが自動的に増える'], correct:1,
      explain:'相手の正確な手は分からなくても、これまでの行動(ポジション・ベット等)から「あり得る手の範囲」を絞り込むことで、より精度の高い判断ができる。'},

  root.innerHTML = `

    </div>
    <div class="chen-box">
      <b>レンジ(範囲)で考える</b>とは、相手の手を「1つに決め打ち」せず「あり得るハンドの分布」で捉える技術。
      前のステージで学んだハンド強さのランクは、そのままポジションごとの「参加レンジ」の目安になる——
      アーリーポジションなら<b>プレミアム＋強い</b>だけ、レイトポジションなら<b>普通クラスまで</b>広げる、というように。

/* =====================================================================
   Stage: ベットサイジングとブラフの数学
   (breakeven fold% is literally the pot-odds formula viewed from the
   bettor's side — verified numerically in Node before writing this)
   ===================================================================== */
const BETSIZE_SCENARIOS = [
  {pot:100, bet:33, label:'1/3ポットベット', pct:25, frac:'4回に1回'},
  {pot:100, bet:50, label:'1/2ポットベット', pct:33, frac:'3回に1回'},
  {pot:100, bet:100, label:'ポットベット(等倍)', pct:50, frac:'2回に1回'},
  {pot:100, bet:200, label:'オーバーベット(2倍ポット)', pct:67, frac:'3回のうち2回'},
  {pot:300, bet:75, label:'小さめのベット(1/4ポット)', pct:20, frac:'5回に1回'},
];
function buildBetSizing(root, ctx){
  const quizzes = BETSIZE_SCENARIOS.map(sc=>{
    const exact = sc.bet/(sc.pot+sc.bet)*100;
    const visual = `<div class="scenario-info">
      <span>ポット：<b>${sc.pot}</b></span>
      <span>あなたのベット：<b>${sc.bet}</b></span>
      <span>状況：<b>${sc.label}</b></span>
    </div>`;
    const choicesArr = numericChoices(sc.pct, 15, '%').map(s=>'約'+s);
    return {
      visual,
      q: 'このベットが損得なし(損益分岐)になるために、相手が最低どれくらいの割合でフォールドしてくれる必要がある？',
      choices: choicesArr,
      correct: choicesArr.indexOf('約'+sc.pct+'%'),
      explain: `${sc.bet} ÷ (${sc.pot}+${sc.bet}) ≈ ${exact.toFixed(1)}%(概算${sc.pct}%)。下の例と同じ考え方で言うと、「${sc.frac}」相手が降りてくれれば、損得なしのラインを超えます。`,
    };
  });
  quizzes.push(
    {q:'ベットを大きくする(ポットに対する割合を上げる)ほど、必要になる相手のフォールド率はどうなる？',
      choices:['下がる','上がる','変わらない'], correct:1,
      explain:'ベットが大きいほど、外れたときの損も大きい。だから「相手がこれくらいの割合で降りてくれないと割に合わない」というラインも上がる。'},
    {q:'もし自分が「強い手のときしかベットしない」人だとバレたら、相手はどうしてくる？',
      choices:['あなたがベットしても気にせずどんどんコールしてくる','特に変わらない','あなたがベットしたら素直に降り、あなたがチェックした時は強気に攻めてくる'], correct:2,
      explain:'実は"読まれにくさ"も大事。強い手の時「だけ」ベットしていると、相手は「ベットされたら降りる(コールしても勝ち目が薄いから)、チェックされたら弱いと分かるので攻める」で簡単に対処できてしまう。せっかくの強い手でもコールしてもらえず、チェックした時は逆に攻められてしまう。だからこそ、たまにブラフも混ぜて「ベットされても本当に強いかどうか分からない」状態を保つ必要がある。'},
  );
  root.innerHTML = `
    <div class="chen-box">
      <b>まず具体例で見てみよう：ポット100の場面で、50をブラフでベットしたら？</b><br>
      あなたは勝てる見込みが薄い手だったが、思い切って50をベットした(いわゆる「ブラフ」)。相手の反応は「フォールド」か「コール」のどちらか。
    </div>
    <div class="bluff-trials">
      <div class="bluff-trial">
        <div class="bluff-trial-label">1回目：相手がフォールド</div>
        <div class="bluff-trial-result plus">+100</div>
        <div class="bluff-trial-desc">相手が降りたので、すでにあったポット100をそのまま獲得できる。</div>
      </div>
      <div class="bluff-trial">
        <div class="bluff-trial-label">2回目：相手がコール</div>
        <div class="bluff-trial-result minus">−50</div>
        <div class="bluff-trial-desc">ブラフを見破られて負け。ベットした50を失う。</div>
      </div>
      <div class="bluff-trial">
        <div class="bluff-trial-label">3回目：相手がコール</div>
        <div class="bluff-trial-result minus">−50</div>
        <div class="bluff-trial-desc">また見破られて負け。またベットした50を失う。</div>
      </div>
    </div>
    <div class="chen-box">
      <b>3回のうち1回だけ、相手が降りてくれれば……</b><br>
      +100 − 50 − 50 = <b>0</b>。ちょうど損得なし(損益分岐)になる！<br>
      つまりこのベットは、<b>「3回に1回」相手が降りてくれるだけで十分</b>、それより多く降りてくれるなら、むしろ得になる。<br>
      この「3回に1回」を計算で求める式が：<br>
      <b>ベット額 ÷ (ポット + ベット額) × 100</b> = 50 ÷ (100+50) × 100 ≈ <b>33%</b>(≒3回に1回)<br>
      実はこれ、前のステージで習った「ポットオッズ(コールに必要な勝率)」と<b>まったく同じ式</b>。あちらは「コールする側」、こちらは「ベットする側」から見ただけの違い。
    </div>

      小さいベットほど、少しの回数フォールドしてもらえるだけで割に合う。大きいベットほど、たくさんフォールドしてもらわないと割に合わない——その代わり、フォールドしてもらえた時に獲得できる金額も大きくなる。
    </div>
    ${ctx.missionBoxHtml}
    <div class="quiz-head">✏️ クイズ：ベットサイジングを計算してみよう</div>

  `;
  renderQuizArea(qs('#quiz-area', root), quizzes, ctx.complete);
}

  root.innerHTML = `
    <div class="chen-box">

      フロップの3枚が、役やドローにどれだけ絡みやすいかで、盤面の性質が変わる。<br>
      <b>乾いている(ドライ)</b>：3枚が別々のスート(フラッシュドローなし)で、数字も離れている(ストレートドローも遠い)。誰の手にもあまり絡まない。<br>
      <b>濡れている(ウェット)</b>：同じスートが2枚以上(フラッシュドロー)や、数字が連続(ストレートドロー)がある。いろいろな手に絡みやすい。
    </div>
    <div class="vs-row">
      <div class="hand-block"><div class="hand-label">ドライな例</div><div class="hand-row">${[[13,'s'],[7,'d'],[2,'c']].map(([r,s])=>cardHtml(mkCard(r,s))).join('')}</div></div>
      <div class="vs-divider">VS</div>
      <div class="hand-block"><div class="hand-label">ウェットな例</div><div class="hand-row">${[[11,'s'],[10,'s'],[9,'h']].map(([r,s])=>cardHtml(mkCard(r,s))).join('')}</div></div>
    </div>
    <div class="chen-box">
      <b>盤面の質でCベット(継続ベット)の判断が変わる</b><br>
      プリフロップでレイズした人は、レンジ思考のステージで学んだ通り「強いハンドに絞られたレンジ」を持っている。
      <b>ドライな盤面</b>ではこの差がそのまま出やすいので、高頻度・小さめのサイズでベット(Cベット)を続けやすい。
      <b>ウェットな盤面</b>では相手のレンジにもドローが絡みやすくなるので、ベットの回数を絞ったり、
      サイズを大きくしてドローに正しい対価を払わせたりする必要がある。
    </div>
    ${ctx.missionBoxHtml}
    <div class="quiz-head">✏️ クイズ：盤面を読んでみよう</div>
    <div id="quiz-area"></div>
  `;
  renderQuizArea(qs('#quiz-area', root), quizzes, ctx.complete);
}

/* =====================================================================
   Stage 6: 総合チャレンジ：CPU対戦 (interactive, non-MCQ)
   ===================================================================== */
function buildFinal(root, ctx){
  const TOTAL_HANDS = 3;
  let handIndex = 0;
  const results = [];

  function playHand(){
    const deck = shuffleArr(freshDeck());
    const playerHole = [deck.pop(), deck.pop()];
    const cpuHole = [deck.pop(), deck.pop()];
    const board = [deck.pop(),deck.pop(),deck.pop(),deck.pop(),deck.pop()];
    let street = 'flop';

    function currentBoard(){ return street==='flop' ? board.slice(0,3) : board.slice(0,4); }

    function renderDecision(){
      const shownBoard = currentBoard();
      const madeBest = bestOf([...playerHole, ...shownBoard]);
      root.innerHTML = `
        ${ctx.missionBoxHtml}
        <div class="table-felt">
          <div class="pot-label">🪙 ポット: 100 ／ ハンド ${handIndex+1} / ${TOTAL_HANDS}</div>
          <div class="hand-block"><div class="hand-label">あなたのホールカード</div><div class="hand-row">${playerHole.map(cardHtml).join('')}</div></div>
          <div class="hand-block"><div class="hand-label">${street==='flop'?'フロップ':'ターン'}</div><div class="hand-row">${shownBoard.map(cardHtml).join('')}</div></div>
          <div class="made-hand">現在の最強の役: <b>${catDisplayName(madeBest.eval)}</b></div>
          <div class="choice-list">
            <button class="btn" id="btn-fold">🏳️ フォールド(降りる)</button>
            <button class="btn btn-primary" id="btn-continue">▶ 勝負を続ける</button>
          </div>
        </div>`;
      linkGlossaryIn(root);
      qs('#btn-fold', root).addEventListener('click', ()=> finishHand('fold'));
      qs('#btn-continue', root).addEventListener('click', ()=>{
        if(street==='flop'){ street='turn'; renderDecision(); }
        else { showdown(); }
      });
    }

    function showdown(){
      const pBest = bestOf([...playerHole, ...board]);
      const cBest = bestOf([...cpuHole, ...board]);
      const cmp = compareEval(pBest.eval, cBest.eval);
      const outcome = cmp>0 ? 'win' : cmp<0 ? 'lose' : 'tie';
      root.innerHTML = `
        ${ctx.missionBoxHtml}
        <div class="table-felt">
          <div class="pot-label">🪙 ショウダウン ／ ハンド ${handIndex+1} / ${TOTAL_HANDS}</div>
          <div class="hand-block"><div class="hand-label">あなたのホールカード</div><div class="hand-row">${playerHole.map(cardHtml).join('')}</div></div>
          <div class="hand-block"><div class="hand-label">CPUのホールカード</div><div class="hand-row">${cpuHole.map(cardHtml).join('')}</div></div>
          <div class="hand-block"><div class="hand-label">ボード</div><div class="hand-row">${board.map(cardHtml).join('')}</div></div>
          <div class="made-hand">あなた: <b>${catDisplayName(pBest.eval)}</b> ／ CPU: <b>${catDisplayName(cBest.eval)}</b></div>
          <div class="showdown-result ${outcome}">${outcome==='win'?'🎉 あなたの勝ち！':outcome==='lose'?'😢 CPUの勝ち…':'🤝 引き分け'}</div>
          <div class="choice-list"><button class="btn btn-primary" id="btn-nexthand">次へ ▶</button></div>
        </div>`;
      linkGlossaryIn(root);
      qs('#btn-nexthand', root).addEventListener('click', ()=> finishHand(outcome));
    }

    function finishHand(outcome){
      results.push(outcome);
      handIndex++;
      if(handIndex>=TOTAL_HANDS) showSummary();
      else playHand();
    }

    renderDecision();
  }

  function showSummary(){
    const wins = results.filter(r=>r==='win').length;
    const loses = results.filter(r=>r==='lose').length;
    const ties = results.filter(r=>r==='tie').length;
    const folds = results.filter(r=>r==='fold').length;
    root.innerHTML = `
      ${ctx.missionBoxHtml}
      <div class="table-felt">
        <div class="pot-label">🏁 全${TOTAL_HANDS}ハンド終了</div>
        <div class="made-hand">勝ち ${wins} ／ 負け ${loses} ／ 引き分け ${ties} ／ フォールド ${folds}</div>
        <p class="step-note">役の見極め、ドローの見込み、無理をしない判断——ここまで学んだ知識を活かせたかな？</p>
      </div>`;
    linkGlossaryIn(root);
    ctx.complete();
  }

  playHand();
}

/* ---------- shared state / persistence ---------- */
const STORE_KEY = 'pokerQuestProgress';
const state = { unlocked:1, cleared:new Set(), currentIndex:0 };

function loadProgress(){
  try{
    const raw = JSON.parse(localStorage.getItem(STORE_KEY) || 'null');
    if(raw){
      state.unlocked = raw.unlocked || 1;
      state.cleared = new Set(raw.cleared || []);
    }
  }catch(e){}
  if (new URLSearchParams(location.search).has('all')) state.unlocked = STAGES.length;
}
function saveProgress(){
  localStorage.setItem(STORE_KEY, JSON.stringify({unlocked:state.unlocked, cleared:[...state.cleared]}));
}

/* ---------- sidebar / header ---------- */
function renderSidebar(){
  const list = qs('#side-list');
  list.innerHTML = STAGES.map((s,i)=>{
    const locked = i > state.unlocked - 1;
    const cleared = state.cleared.has(i);
    const active = i === state.currentIndex;
    const icon = cleared ? '✅' : locked ? '🔒' : '🃏';
    return `<div class="side-item ${active?'active':''} ${locked?'locked':''}" data-index="${i}">
      <span class="side-icon">${icon}</span>
      <span class="side-text">
        <div class="side-main">第${i+1}ステージ ${s.title}</div>
        <div class="side-sub">${s.sub}</div>
      </span>
    </div>`;
  }).join('');
  list.querySelectorAll('.side-item').forEach(item=>{
    item.addEventListener('click', ()=>{
      const i = Number(item.dataset.index);
      if(i > state.unlocked - 1) return;
      mountStage(i);
    });
  });

  qs('#progress-label').textContent = `クリア ${state.cleared.size} / ${STAGES.length}`;
  qs('#progress-fill').style.width = (state.cleared.size / STAGES.length * 100) + '%';
}

qs('#btn-reset-all').addEventListener('click', ()=>{
  if(!confirm('進行状況をすべてリセットして最初からやり直しますか？')) return;
  state.unlocked = 1; state.cleared = new Set();
  saveProgress();
  mountStage(0);
});

function missionBoxHtml(meta, index){
  return `<div class="mission-box">
      <div class="mission-label">🎯 お題</div>
      <div class="mission-text">${meta.missionText}</div>
      <div class="mission-status" id="mission-status">${state.cleared.has(index) ? '達成！' : '未達成'}</div>
    </div>`;
}
function mountStage(index){
  state.currentIndex = index;
  const meta = STAGES[index];
  const main = qs('#main-area');
  main.innerHTML = `
    <div class="chapter-head">
      <span class="chapter-badge">第${index+1}ステージ</span><span class="chapter-title">${meta.title}</span>
      <div class="chapter-sub">${meta.sub}</div>
    </div>
    <div class="dialogue-scene">${renderDialogue(meta.dialogue)}</div>
    <div class="stage-play" id="stage-play"></div>
    <div class="stage-nav">
      <button class="btn" id="btn-retry">↺ このステージをやり直す</button>
      <button class="btn btn-primary" id="btn-next" ${state.cleared.has(index) ? '' : 'disabled'}>
        ${index === STAGES.length-1 ? 'クリア画面へ ▶' : 'つぎのステージへ ▶'}
      </button>
    </div>
  `;

  qs('#btn-retry').addEventListener('click', ()=> mountStage(index));
  qs('#btn-next').addEventListener('click', ()=>{
    if(index === STAGES.length-1) showEnding();
    else mountStage(index+1);
  });

  const ctx = {
    missionBoxHtml: missionBoxHtml(meta, index),
    complete(){
      if(state.cleared.has(index)) return;
      state.cleared.add(index);
      state.unlocked = Math.max(state.unlocked, index+2);
      saveProgress();
      const statusEl = qs('#mission-status');
      statusEl.textContent = '達成！';
      statusEl.classList.add('ok');
      qs('#btn-next').removeAttribute('disabled');
      renderSidebar();
    },
  };
  meta.build(qs('#stage-play'), ctx);
  if(state.cleared.has(index)) qs('#mission-status')?.classList.add('ok');
  linkGlossaryIn(main);
  renderSidebar();
  window.scrollTo({top:0, behavior:'smooth'});
}

        ✅ 盤面が乾いている(ドライ)か濡れている(ウェット)かで、Cベットの頻度とサイズを変える
      </div>
      <button class="btn btn-primary" id="btn-replay">↺ はじめから学びなおす</button>

  `;
  linkGlossaryIn(main);
  qs('#btn-replay').addEventListener('click', ()=>{

  });
  state.currentIndex = -1;
  renderSidebar();
}

/* ---------- boot ---------- */
loadProgress();
mountStage(Math.min(state.currentIndex, state.unlocked-1));
renderBookRecommend();
